<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T'REX Logistics | Official Website</title>

    <link rel="icon" type="image/png" href="favicon.png">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --navy: #001B3D;
            --gold: #C5A059;
            --white: #FFFFFF;
            --soft-gray: #F4F7F9;
            --text: #2D3436;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Jost', sans-serif;
            color: var(--text);
            line-height: 1.8;
            background-color: var(--white);
        }

        * {
            box-sizing: border-box;
        }

        h1, h2, h3, .serif {
            font-family: 'Playfair Display', serif;
            color: var(--navy);
            font-weight: 700;
        }

        .subtitle {
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 13px;
            color: var(--gold);
            font-weight: 600;
            margin-bottom: 15px;
            display: block;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 25px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: transparent;
            z-index: 2000;
            transition: var(--transition);
        }

        nav.scrolled {
            padding: 15px 8%;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .logo img {
            height: 50px;
            width: auto;
            border-radius: 5px;
        }

        .nav-links {
            display: flex;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--navy);
            margin-left: 30px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            transition: var(--transition);
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        .track-nav-btn {
            background: var(--gold);
            color: var(--white) !important;
            padding: 10px 25px;
            border-radius: 5px;
            margin-left: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .track-nav-btn:hover {
            background: var(--navy) !important;
            transform: translateY(-2px);
        }

        .menu-toggle {
            display: none;
            font-size: 24px;
            color: var(--navy);
            cursor: pointer;
        }

        .hero {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 0 8%;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            position: relative;
            overflow: hidden;
        }

        .hero::after {
            content: "T'REX";
            position: absolute;
            right: -5%;
            font-family: 'Playfair Display', serif;
            font-size: 25vw;
            font-weight: 900;
            color: rgba(0, 27, 61, 0.03);
            pointer-events: none;
            z-index: 1;
            white-space: nowrap;
        }

        .hero-content {
            max-width: 800px;
            z-index: 2;
            position: relative;
        }

        .hero h1 {
            font-size: clamp(3.2rem, 8vw, 6rem);
            line-height: 1.1;
            margin-bottom: 25px;
        }

        .stats-bar {
            background: var(--navy);
            color: var(--white);
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            padding: 50px 8%;
            text-align: center;
        }

        .stat-item h2 {
            color: var(--gold);
            font-size: 2.5rem;
            margin: 0;
        }

        .stat-item p {
            margin: 0;
            font-size: 14px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .section {
            padding: 100px 8%;
            width: 100%;
        }

        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
        }

        .image-box img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 20px 20px 0 var(--soft-gray);
        }

        .services {
            background: var(--soft-gray);
        }

        .service-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-top: 60px;
        }

        .service-card {
            background: var(--white);
            padding: 50px 35px;
            border-radius: 8px;
            transition: var(--transition);
            border-bottom: 3px solid transparent;
        }

        .service-card:hover {
            transform: translateY(-10px);
            border-color: var(--gold);
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        .service-card i {
            font-size: 45px;
            color: var(--gold);
            margin-bottom: 20px;
        }

        .wa-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #25D366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            z-index: 3000;
            transition: var(--transition);
        }

        .wa-float:hover {
            transform: scale(1.1);
            background: #128C7E;
        }

        footer {
            background: #000D1E;
            color: var(--white);
            padding: 100px 8% 50px;
            width: 100%;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr 1.2fr;
            gap: 50px;
        }

        .footer-links h4 {
            color: var(--gold);
            margin-bottom: 25px;
            text-transform: uppercase;
            font-size: 14px;
        }

        .footer-links p {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .footer-links i {
            width: 25px;
            display: inline-block;
            text-align: left;
            color: var(--gold);
        }

        .footer-links a {
            color: inherit;
            text-decoration: none;
            transition: 0.3s;
        }

        .footer-links a:hover {
            color: var(--gold);
        }

        /* FIX ADDRESS ALIGNMENT */
        .address-container {
            display: flex;
            align-items: flex-start;
            margin-top: 12px;
        }

        .address-container i {
            width: 25px;
            min-width: 25px;
            color: var(--gold);
            margin-top: 4px;
            flex-shrink: 0;
        }

        .address-text {
            line-height: 1.6;
            font-size: 14px;
            opacity: 0.7;
        }

        .address-title {
            white-space: nowrap;
            display: block;
            color: var(--white);
            opacity: 1;
        }

        @media (max-width: 992px) {

            nav {
                padding: 15px 5%;
                background: var(--white);
            }

            .menu-toggle {
                display: block;
            }

            .nav-links {
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: var(--white);
                flex-direction: column;
                padding: 30px 0;
                display: none;
                box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            }

            .nav-links.active {
                display: flex;
            }

            .nav-links a {
                margin: 15px 0;
                margin-left: 0;
                width: 100%;
                text-align: center;
            }

            .track-nav-btn {
                width: 80% !important;
                margin: 15px auto !important;
                justify-content: center;
            }

            .about-grid,
            .service-grid,
            .footer-grid,
            .stats-bar {
                grid-template-columns: 1fr;
                gap: 40px;
            }

            .hero {
                text-align: center;
                justify-content: center;
                padding-top: 80px;
            }

            .hero::after {
                font-size: 40vw;
                right: -20%;
                top: 40%;
            }
        }
    </style>
</head>

</body>
</html>
