<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Track Shipment | T'REX Logistics</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%; /* Fallback */
            height: 100dvh; /* Tinggi pas layar HP */
            overflow: hidden; /* Kunci scroll utama */
            background: #001B3D;
            color: white;
            font-family: 'Jost', sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* Area utama yang bisa scroll JIKA konten meluap */
        .main-wrapper {
            flex: 1;
            overflow-y: auto; /* Scroll muncul otomatis jika hasil track panjang */
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            -webkit-overflow-scrolling: touch; /* Scroll halus di iOS */
        }

        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #C5A059;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            z-index: 10;
        }

        .track-container {
            width: 100%;
            max-width: 600px;
            text-align: center;
            padding: 60px 20px 40px 20px; /* Padding atas lebih besar untuk back button */
            margin: auto; /* Memastikan konten di tengah secara vertikal saat kosong */
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .search-box {
            background: white;
            padding: 5px;
            border-radius: 10px;
            display: flex;
            margin-top: 30px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .search-box input {
            flex: 1;
            border: none;
            padding: 12px 15px;
            outline: none;
            font-size: 16px;
            color: #333;
            min-width: 0;
        }

        .search-box button {
            background: #C5A059;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
        }

        #result {
            margin-top: 30px;
            color: #C5A059;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        footer {
            padding: 15px;
            text-align: center;
            font-size: 0.8rem;
            opacity: 0.6;
            background: #001B3D;
            border-top: 1px solid rgba(197, 160, 89, 0.1);
            flex-shrink: 0; /* Pastikan footer tidak gepeng */
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .track-container { padding-top: 80px; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> BACK</a>
        
        <div class="track-container">
            <img src="trex.jpeg" alt="Logo" style="height: 60px; margin-bottom: 20px; border-radius: 8px;">
            <h1>Track Shipment</h1>
            <p style="opacity: 0.7;">Masukkan nomor resi resmi T'REX Logistics Anda.</p>
            
            <div class="search-box">
                <input type="text" id="resiInput" placeholder="Contoh: TRX-998877" spellcheck="false">
                <button onclick="track()">LACAK</button>
            </div>
            
            <div id="result"></div>
        </div>
    </div>

    <footer>
        &copy; 2026 T'REX Logistics. All Rights Reserved.
    </footer>

    <script>
        function track() {
            const input = document.getElementById('resiInput').value;
            const res = document.getElementById('result');
            
            if(!input) {
                res.innerHTML = "<small style='color: #ff6b6b;'>Silakan masukkan nomor resi.</small>";
                return;
            }

            res.innerHTML = "<i class='fas fa-circle-notch fa-spin'></i> Searching...";
            
            setTimeout(() => {
                // Menambah konten panjang untuk tes scroll
                res.innerHTML = `
                    <div style="background: rgba(197, 160, 89, 0.1); padding: 15px; border-radius: 10px; border: 1px solid #C5A059;">
                        <span style="color: #C5A059; font-weight: bold;">Status ${input}</span><br>
                        <span style="color: white; font-size: 0.95rem;">Paket sedang diproses di HUB Jakarta (Sorting Facility).</span>
                        <hr style="border: 0.5px solid rgba(197,160,89,0.2); margin: 10px 0;">
                        <small style="color: #aaa; display: block; text-align: left;">
                            • 07 Mei 2026 22:30 - Paket tiba di HUB Jakarta<br>
                            • 07 Mei 2026 18:15 - Paket diberangkatkan dari Bandung<br>
                            • 07 Mei 2026 10:00 - Paket diterima oleh kurir
                        </small>
                    </div>`;
            }, 1000);
        }

        document.getElementById("resiInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                track();
            }
        });
    </script>
</body>
</html>
