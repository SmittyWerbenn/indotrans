<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lacak Pengiriman | T'REX Logistics</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Jost', sans-serif; margin: 0; background: #001B3D; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .track-container { width: 90%; max-width: 600px; text-align: center; padding: 40px; }
        .back-home { position: absolute; top: 30px; left: 30px; color: #C5A059; text-decoration: none; font-weight: 600; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 10px; }
        .search-box { background: white; padding: 8px; border-radius: 10px; display: flex; margin-top: 30px; }
        .search-box input { flex: 1; border: none; padding: 15px; outline: none; font-size: 16px; }
        .search-box button { background: #C5A059; color: white; border: none; padding: 0 30px; border-radius: 8px; cursor: pointer; font-weight: 700; }
        #result { margin-top: 30px; color: #C5A059; font-size: 1.1rem; }
    </style>
</head>
<body>
    <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> KEMBALI</a>
    <div class="track-container">
        <img src="trex.jpeg" alt="Logo" style="height: 60px; margin-bottom: 20px;">
        <h1>Lacak Pengiriman</h1>
        <p style="opacity: 0.7;">Masukkan nomor resi resmi T'REX Logistics Anda.</p>
        <div class="search-box">
            <input type="text" id="resiInput" placeholder="Contoh: TRX-998877">
            <button onclick="track()">LACAK</button>
        </div>
        <div id="result"></div>
    </div>
    <script>
        function track() {
            const input = document.getElementById('resiInput').value;
            const res = document.getElementById('result');
            if(!input) return;
            res.innerHTML = "<i class='fas fa-circle-notch fa-spin'></i> Mencari...";
            setTimeout(() => {
                res.innerHTML = "Status <b>" + input + "</b>: Paket sedang diproses di HUB Jakarta.";
            }, 1500);
        }
    </script>
</body>
</html>
